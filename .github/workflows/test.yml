name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LuaJIT
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit make

      - name: Run tests
        run: make test
